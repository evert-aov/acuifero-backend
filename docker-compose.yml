version: "3.8"
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: acuifero
      POSTGRES_PASSWORD: acuifero2026
      POSTGRES_DB: acuifero_scz
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - db

volumes:
  pgdata:
